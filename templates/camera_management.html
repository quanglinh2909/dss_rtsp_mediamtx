<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Management - DSS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        .navbar-brand {
            font-weight: 600;
        }

        .table-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            padding: 25px;
            margin-top: 30px;
            margin-bottom: 50px;
        }

        .status-badge {
            font-size: 0.85em;
            padding: 6px 12px;
            border-radius: 50px;
            font-weight: 500;
        }

        .status-online {
            background-color: #d1e7dd;
            color: #0f5132;
        }

        .status-offline {
            background-color: #f8d7da;
            color: #842029;
        }

        .status-restarting {
            background-color: #fff3cd;
            color: #664d03;
        }

        .status-unknown {
            background-color: #e2e3e5;
            color: #41464b;
        }

        .btn-action {
            margin-right: 5px;
        }

        .table th {
            font-weight: 600;
            color: #495057;
            border-bottom-width: 2px;
        }

        .table td {
            vertical-align: middle;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">🚦 DSS Signal</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/dss/">Cameras</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="table-container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0">Cameras</h4>
                <button class="btn btn-primary" onclick="openAddModal()">+ Add New Camera</button>
            </div>

            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th style="width: 15%">ID</th>
                            <th style="width: 20%">Name</th>
                            <th style="width: 20%">Channel ID</th>
                            <th style="width: 20%">VMS ID</th>
                            <th style="width: 10%">Status</th>
                            <th style="width: 15%">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="cameraTableBody">
                        <tr>
                            <td colspan="6" class="text-center text-muted">Loading cameras...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="cameraModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="cameraModalTitle">Add Camera</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="cameraForm">
                        <input type="hidden" id="cameraId">
                        <div class="mb-3">
                            <label class="form-label text-muted small mb-1">CAMERA NAME</label>
                            <input type="text" class="form-control" id="cameraName"
                                placeholder="e.g. Intersection A - Cam 1" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small mb-1">CHANNEL ID</label>
                            <input type="text" value="1000000$1$0$0" class="form-control" id="cameraChannelId" placeholder="1000000$1$0$0" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small mb-1">VMS ID</label>
                            <input type="text" class="form-control" id="cameraVmsId" placeholder="e.g. cam_1_vms"
                                required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light shadow-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary shadow-sm px-4" onclick="saveCamera()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = '/dss/camera'; // Tương đối từ host
        const WS_URL = (window.location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + window.location.host + '/dss/ws/connect';
        let cameraModal;

        document.addEventListener('DOMContentLoaded', () => {
            cameraModal = new bootstrap.Modal(document.getElementById('cameraModal'));
            loadCameras();
            connectWebSocket();
        });

        async function loadCameras() {
            try {
                const response = await fetch(API_BASE);
                if (!response.ok) throw new Error("Failed to load");
                const data = await response.json();
                const tbody = document.getElementById('cameraTableBody');
                tbody.innerHTML = '';

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No cameras found. Add one to get started.</td></tr>';
                    return;
                }

                data.forEach(cam => {
                    tbody.appendChild(createRow(cam));
                });
            } catch (error) {
                console.error(error);
                const tbody = document.getElementById('cameraTableBody');
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-danger">Error loading cameras. Check console for details.</td></tr>';
            }
        }

        function createRow(cam) {
            const tr = document.createElement('tr');
            tr.id = 'cam-row-' + cam.id;
            tr.innerHTML = `
            <td class="text-muted"><small>${cam.id.substring(0, 8)}...</small></td>
            <td class="fw-medium">${escapeHtml(cam.name)}</td>
            <td>${escapeHtml(cam.channel_id)}</td>
            <td>${escapeHtml(cam.id_camera_vms)}</td>
            <td id="status-${cam.id}">${getStatusBadge(cam.status)}</td>
            <td>
                <button class="btn btn-sm btn-outline-secondary btn-action" onclick='openEditModal(${JSON.stringify(cam).replace(/'/g, "&#39;")})'>Edit</button>
                <button class="btn btn-sm btn-outline-danger btn-action" onclick="deleteCamera('${cam.id}')">Delete</button>
            </td>
        `;
            return tr;
        }

        function escapeHtml(unsafe) {
            return (unsafe || "").toString()
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function getStatusBadge(status) {
            if (!status) status = "UNKNOWN";
            const st = status.toLowerCase();
            let badgeClass = "status-unknown";
            if (st === "online") badgeClass = "status-online";
            else if (st === "offline") badgeClass = "status-offline";
            else if (st === "restarting") badgeClass = "status-restarting";

            return `<span class="status-badge ${badgeClass}">${status.toUpperCase()}</span>`;
        }

        function openAddModal() {
            document.getElementById('cameraForm').reset();
            document.getElementById('cameraId').value = '';
            document.getElementById('cameraModalTitle').innerText = 'Add New Camera';
            cameraModal.show();
        }

        function openEditModal(cam) {
            document.getElementById('cameraId').value = cam.id;
            document.getElementById('cameraName').value = cam.name;
            document.getElementById('cameraChannelId').value = cam.channel_id;
            document.getElementById('cameraVmsId').value = cam.id_camera_vms;
            document.getElementById('cameraModalTitle').innerText = 'Edit Camera';
            cameraModal.show();
        }

        async function saveCamera() {
            const id = document.getElementById('cameraId').value;
            const name = document.getElementById('cameraName').value;
            const channel_id = document.getElementById('cameraChannelId').value;
            const id_camera_vms = document.getElementById('cameraVmsId').value;

            if (!name || !channel_id || !id_camera_vms) {
                alert("Please fill all fields.");
                return;
            }

            const payload = { name, channel_id, id_camera_vms };
            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_BASE}/${id}` : API_BASE;

            try {
                const btn = document.querySelector('#cameraModal .btn-primary');
                btn.disabled = true;
                btn.innerText = 'Saving...';

                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    cameraModal.hide();
                    loadCameras();
                } else {
                    const err = await res.json();
                    alert(`Error: ${err.detail || 'Failed to save camera'}`);
                }
            } catch (e) {
                console.error(e);
                alert("Network error. Could not save camera.");
            } finally {
                const btn = document.querySelector('#cameraModal .btn-primary');
                btn.disabled = false;
                btn.innerText = 'Save';
            }
        }

        async function deleteCamera(id) {
            if (!confirm("Are you sure you want to delete this camera? This action cannot be undone.")) return;
            try {
                const res = await fetch(`${API_BASE}/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    loadCameras();
                } else {
                    alert("Error deleting camera");
                }
            } catch (e) {
                console.error(e);
            }
        }

        function connectWebSocket() {
            const ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                console.log("WebSocket connected to " + WS_URL);
                ws.send(JSON.stringify({ add_event: "update_camera_status" }));
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.event === "update_camera_status" && msg.data) {
                        updateStatus(msg.data.camera_id, msg.data.status);
                    }
                } catch (e) {
                    console.error("Error parsing WS message", e);
                }
            };

            ws.onclose = () => {
                console.log("WebSocket disconnected, retrying in 3s...");
                setTimeout(connectWebSocket, 3000);
            };
        }

        function updateStatus(cameraId, status) {
            const statusTd = document.getElementById('status-' + cameraId);
            if (statusTd) {
                statusTd.innerHTML = getStatusBadge(status);
                // Highlight row briefly to show update
                const row = document.getElementById('cam-row-' + cameraId);
                if (row) {
                    row.style.transition = 'background-color 0.5s';
                    row.style.backgroundColor = '#fdfae3';
                    setTimeout(() => { row.style.backgroundColor = ''; }, 500);
                }
            }
        }
    </script>
</body>

</html>
